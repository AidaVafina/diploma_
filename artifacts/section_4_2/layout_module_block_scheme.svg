<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1500" viewBox="0 0 3200 1500">
<text x="120" y="120" font-size="58" font-weight="700" fill="#1E293B" font-family="Arial">Модуль layout-анализа</text>
<text x="120" y="166" font-size="30" fill="#5B657A" font-family="Arial">Последовательность обработки страницы по разделу 4.2 и актуальному коду</text>
<line x1="120" y1="190" x2="3080" y2="190" stroke="#DCE4F0" stroke-width="3" />
<rect x="120" y="420" width="400" height="400" rx="34" ry="34" fill="#F4F8FF" stroke="#4F46E5" stroke-width="6" />
<text x="320.0" y="579.0" font-size="32" font-weight="700" text-anchor="middle" fill="#1E293B" font-family="Arial">1. Вход модуля</text>
<text x="320.0" y="620.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">RGB-изображение</text>
<text x="320.0" y="655.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">страницы</text>
<text x="320.0" y="690.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">после рендера PDF</text>
<rect x="640" y="420" width="500" height="400" rx="34" ry="34" fill="#F4F8FF" stroke="#4F46E5" stroke-width="6" />
<text x="890.0" y="544.0" font-size="32" font-weight="700" text-anchor="middle" fill="#1E293B" font-family="Arial">2. Сырые данные Surya</text>
<text x="890.0" y="585.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">LayoutPredictor выделяет</text>
<text x="890.0" y="620.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">области страницы</text>
<text x="890.0" y="678.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">RecognitionPredictor извлекает</text>
<text x="890.0" y="713.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">OCR-строки и их координаты</text>
<rect x="1260" y="420" width="540" height="400" rx="34" ry="34" fill="#FFF5F7" stroke="#E11D48" stroke-width="6" />
<text x="1530.0" y="541.0" font-size="32" font-weight="700" text-anchor="middle" fill="#1E293B" font-family="Arial">3. Формирование</text>
<text x="1530.0" y="582.0" font-size="32" font-weight="700" text-anchor="middle" fill="#1E293B" font-family="Arial">LayoutBlock</text>
<text x="1530.0" y="623.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">нормализация типов блоков</text>
<text x="1530.0" y="658.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">привязка OCR-строк к bbox</text>
<text x="1530.0" y="693.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">заполнение text, confidence</text>
<text x="1530.0" y="728.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">и reading_order</text>
<rect x="1920" y="420" width="520" height="400" rx="34" ry="34" fill="#F4F8FF" stroke="#4F46E5" stroke-width="6" />
<text x="2180.0" y="561.5" font-size="32" font-weight="700" text-anchor="middle" fill="#1E293B" font-family="Arial">4. Постобработка блоков</text>
<text x="2180.0" y="602.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">удаление мелких областей</text>
<text x="2180.0" y="637.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">определение page_number</text>
<text x="2180.0" y="672.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">слияние соседних текстовых блоков</text>
<text x="2180.0" y="707.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">сортировка и перенумерация</text>
<rect x="2560" y="420" width="520" height="400" rx="34" ry="34" fill="#F4F8FF" stroke="#4F46E5" stroke-width="6" />
<text x="2820.0" y="579.0" font-size="32" font-weight="700" text-anchor="middle" fill="#1E293B" font-family="Arial">5. Сохранение артефактов</text>
<text x="2820.0" y="620.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">строится PNG-визуализация</text>
<text x="2820.0" y="655.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">результат сохраняется в JSON</text>
<text x="2820.0" y="690.0" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">визуализация кладётся в cache</text>
<rect x="2560" y="880" width="520" height="190" rx="34" ry="34" fill="#EEFDF4" stroke="#16A34A" stroke-width="6" />
<text x="2820.0" y="916.5" font-size="32" font-weight="700" text-anchor="middle" fill="#1E293B" font-family="Arial">6. Выход модуля</text>
<text x="2820.0" y="957.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">LayoutAnalysisResponse:</text>
<text x="2820.0" y="992.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">analysis_id, blocks,</text>
<text x="2820.0" y="1027.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">visualization_url,</text>
<text x="2820.0" y="1062.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">result_json_path</text>
<rect x="1310" y="900" width="440" height="180" rx="34" ry="34" fill="#FFF5F7" stroke="#E11D48" stroke-width="5" />
<text x="1530.0" y="931.5" font-size="32" font-weight="700" text-anchor="middle" fill="#1E293B" font-family="Arial">3а. Для formula</text>
<text x="1530.0" y="972.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">вырезка области</text>
<text x="1530.0" y="1007.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">RecognitionPredictor</text>
<text x="1530.0" y="1042.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">(block_without_boxes)</text>
<text x="1530.0" y="1077.5" font-size="25" text-anchor="middle" fill="#1E293B" font-family="Arial">получение LaTeX</text>
<polyline points="520,620 640,620" fill="none" stroke="#64748B" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />
<polygon points="640,620 616,606 616,634" fill="#64748B" />
<polyline points="1140,620 1260,620" fill="none" stroke="#64748B" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />
<polygon points="1260,620 1236,606 1236,634" fill="#64748B" />
<polyline points="1800,620 1920,620" fill="none" stroke="#64748B" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />
<polygon points="1920,620 1896,606 1896,634" fill="#64748B" />
<polyline points="2440,620 2560,620" fill="none" stroke="#64748B" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />
<polygon points="2560,620 2536,606 2536,634" fill="#64748B" />
<polyline points="2820,820 2820,880" fill="none" stroke="#64748B" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />
<polygon points="2820,880 2806,856 2834,856" fill="#64748B" />
<polyline points="1530,820 1530,900" fill="none" stroke="#64748B" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="18 12" />
<polygon points="1530,900 1516,876 1544,876" fill="#64748B" />
</svg>